<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=0.75, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F4F9F9">
    <title>Khảo Sát Sức Khỏe Tâm Lý</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#6BA4CC',
                        'brand-mint': '#85D3C1',
                        'brand-dark': '#173F4F',
                        'brand-surface': '#F4F9F9'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.6s ease-out',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS SDK (UMD Bundle) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase-js.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body
    class="min-h-screen w-full text-slate-800 flex flex-col font-sans selection:bg-brand-mint selection:text-white bg-white">
    <div id="root" class="flex flex-col flex-1 w-full min-h-screen"></div>
    <script src="script.js"></script>
</body>

</html>
